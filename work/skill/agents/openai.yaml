interface:
  display_name: "Legacy System Vulnerability Hunter"
  short_description: "Verify bugs in an authorized unknown codebase"
  default_prompt: "Inspect the authorized code/ system in one independent run. Temporarily isolate answer-bearing material, classify the system archetype, assess all 15 bug directions, and build a risk-weighted attack-surface plan. Derive independent hypotheses, then validate every project-provided lead. Use complementary dynamic techniques, continue through safe fallback levels, and prove key product paths execute with an available native coverage tool. Run bounded targeted mutation testing only in a disposable isolated copy, strengthen tests for surviving critical decision mutants, require no unresolved critical mutant and at least 80% targeted mutation score for a complete run, rebalance uncovered high-risk directions, target at least 95% risk-weighted test coverage without claiming 95% Bug recall, execute controls and three reruns, and write auditable evidence to result/ and logs/."
